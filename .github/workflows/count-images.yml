name: Update image count

on:
  push:
    paths:
      - 'images/**'   # Only run if images change (adjust as needed)
      - 'count_images.py'

jobs:
  update-count:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run image count script
      run: python count_images.py

    - name: Commit and push updated count
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add image_count.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Update image count"
        git push

