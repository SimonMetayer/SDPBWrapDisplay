name: Update image count

on:
  push:
    # You can restrict to images/ or scripts/ folder later if you want
    # paths:
    #   - 'images/**'
    #   - 'count_images.py'

jobs:
  update-image-count:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Show current directory and files (debug)
        run: |
          pwd
          ls -la
          ls -la images/

      - name: Run image count script
        run: python count_images.py

      - name: Configure git for commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push updated count
        run: |
          git add image_count.json
          git commit -m "Update image count" || echo "No changes to commit"
          git push

