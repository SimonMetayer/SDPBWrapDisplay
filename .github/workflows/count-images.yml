name: Update image count

permissions:
  contents: write

on:
  push:
    # You can limit this later to specific paths if you want:
    # paths:
    #   - 'images/**'
    #   - 'image_count.py'

jobs:
  update-image-count:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Show current directory and files (for debug)
        run: |
          pwd
          ls -la
          ls -la images/

      - name: Run image count script
        run: python image_count.py

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push updated image_count.json
        run: |
          git add image_count.json
          git commit -m "Update image count" || echo "No changes to commit"
          git push

