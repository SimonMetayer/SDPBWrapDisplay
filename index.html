<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>S-matrix Bootstrap</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']],
        packages: {'[+]': ['amsmath', 'hyperref']}
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>

<body>
  <h1>S-matrix Bootstrap Extremal Amplitudes Viewer</h1>

  <div class="controls">
    <!-- Slider and select controls -->
    <div class="slider-container">
      <label for="paramD">Dimension d: <span id="valD">4</span></label><br />
      <input type="range" id="paramD" min="4" max="6" step="2" value="4" />
    </div>

    <div class="slider-container">
      <label for="paramCI">Low Energy ci: <span id="valCI">0</span></label><br />
      <input type="range" id="paramCI" min="0" max="3" value="0" />
    </div>

    <div class="slider-container">
      <label for="paramL">Spin L: <span id="valL">0</span></label><br />
      <input type="range" id="paramL" min="0" max="6" step="2" value="0" />
    </div>

    <div class="slider-container">
      <label for="paramLmax">lmax: <span id="valLmax">16</span></label><br />
      <input type="range" id="paramLmax" min="14" max="16" step="2" value="16" />
    </div>

    <div class="slider-container">
      <label for="paramNmax">Nmax: <span id="valNmax">11</span></label><br />
      <input type="range" id="paramNmax" min="10" max="11" value="11" />
    </div>

    <div class="slider-container">
      <label for="paramImprov">Improvement:</label><br />
      <select id="paramImprov">
        <option value="SPC">SPC (Subtracted Positivity Constraints)</option>
        <option value="TH, SPC" selected>TH (Threshold) + SPC</option>
      </select>
    </div>
  </div>

  <div class="grid">
    <div class="image-container">
      <div class="image-title">Amplitude Max</div>
      <img id="img1" alt="Amplitude Max" />
    </div>
    <div class="image-container">
      <div class="image-title">Amplitude Min</div>
      <img id="img2" alt="Amplitude Min" />
    </div>
    <div class="image-container">
      <img id="img3" alt="ComplexAmplitude Max" />
    </div>
    <div class="image-container">
      <img id="img4" alt="ComplexAmplitude Min" />
    </div>
  </div>

  <div class="almond-grid" id="almondGrid"></div>

  <div class="convergence-container">
    <img id="convImgMax" alt="Convergence Max" />
    <img id="convImgMin" alt="Convergence Min" />
  </div>

  <div class="cid-grid" id="cidGrid">
    <img id="cidImgMax" alt="CI Max" />
    <img id="cidImgMin" alt="CI Min" />
  </div>

  <h1>S-matrix bootstrap framework (Work in progress)</h1>
  
  <div id="latex-explanation"></div>

  <footer>
    Made by Simon Metayer — contact <a href="mailto:simonmetayer@neuf.fr">simonmetayer@neuf.fr</a> to request missing plots.
  </footer>

  <div class="logo-container">
    <img src="images/logo/cnrs-logo.png" alt="CNRS Logo" class="logo" />
    <img src="images/logo/lapth-logo.png" alt="LAPTH Logo" class="logo" />
    <img src="images/logo/duck.jpg" alt="LAPTH Logo" class="logo" />
  </div>
  
  <script src="script.js"></script>
</body>
</html>
